apiVersion: apps/V1
kind: Deployment
metadata:
  name:html-demo
specs:
  replica: 2
  selector:
  matchLabels:
  app:html-demo
  template:
  metadata:
  labels:
  app:html-demo
  spec:
  containers:
  - name: html-demo
  image:sweta84/html-demo:latest
  ports:
  -containerPort:80
  ---
  apiVersion: v1
  kind:Service
  metadata:
    name:html-demo-service
    spec:type:NodePort
    Selector:
    app:html-demo
